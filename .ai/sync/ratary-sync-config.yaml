# Ratary sync configuration — Ontorata organizational memory
# Canonical source: repository + .ai/ — Ratary holds semantic copies + session memory
# Phase 4: dogfood ingest pipeline (Must Enable)

version: "1.0"
project: ontorata
workspace: ontorata-engineering

# Source of truth — never replace, only ingest
source_of_truth:
  repository: ai-brain
  canonical_paths:
    - .ai/core/constitution/
    - .ai/core/governance/
    - .ai/core/adr/
    - .ai/core/product/
    - .ai/core/business/
    - .ai/core/vision/
    - .ai/phases/
    - .ai/reviews/
    - docs/architecture/
    - docs/architecture/governance/

# Paths synced to Ratary semantic memory
ingest:
  # Explicit organizational knowledge
  governance:
    paths:
      - .ai/core/
    exclude:
      - "**/.git/**"
    tags: [governance, architecture, product, business]
    refresh: on_commit # target — manual until pipeline live

  # Phase 4 evidence packages
  reviews:
    paths:
      - .ai/reviews/
    tags: [evidence, phase-4, execution]
    refresh: on_session_end

  # Public documentation mirror
  public_docs:
    paths:
      - docs/
    tags: [documentation, public]
    refresh: on_commit

  # Session audit trail (secondary to save_memory)
  sessions:
    paths:
      - .ai/sessions/CURRENT.md
    tags: [session, audit-trail, handoff]
    refresh: on_session_end

# Active memory via MCP (Cursor) — primary session recall when available
mcp:
  tools:
    recall:
      - search_memory
      - get_memory_by_codename
      - get_context
    persist:
      - save_memory
      - update_memory
  default_queries:
    session_start:
      - project: ontorata
      - tags: [handoff, phase-4]
    phase_context:
      - query: "Phase 4 Proof of Platform execution contract"
    architecture:
      - query: "ADR decisions Ratary Studio boundaries"

# Memory domains (taxonomy for save_memory / ingest)
domains:
  architecture:
    tags: [adr, rfc, blueprint, trade-off]
  product:
    tags: [principles, roadmap, wedge, kpi]
  execution:
    tags: [implementation, completion-report, evidence, session]
  business:
    tags: [pricing, gtm, customer-feedback, hypothesis]

# Validation rule — repository wins on conflict
validation:
  on_conflict: repository_wins
  validate_paths:
    - .ai/core/adr/
    - .ai/phases/04-proof-of-platform/EXECUTION-CONTRACT.md

# Phase 4 first internal workload
dogfood:
  enabled: true
  workload_type: knowledge_pipeline
  description: Ontorata organizational memory on Ratary
  evidence_package: .ai/reviews/2026-07-ratary-org-memory/

# P1-A execution contract — Org Memory Dogfood
p1a_org_memory_contract:
  objective: "Ratary used as daily engineering memory for Ontorata"
  acceptance_gates: [G1, G2, G3, G4, G5, G6]
  ingest_sources:
    engineering_docs:
      paths:
        - .ai/core/
        - docs/architecture/
      refresh: on_commit
      tags: [org-memory, engineering, governance]
    adrs:
      paths:
        - .ai/core/architecture/ADR-*.md
      refresh: on_commit
      tags: [org-memory, adr]
    governance_releases:
      paths:
        - .ai/governance/releases/
      refresh: on_commit
      tags: [org-memory, release, governance]
    evidence_reviews:
      paths:
        - .ai/reviews/
      refresh: on_session_end
      tags: [org-memory, evidence, phase-4]
    session_handoffs:
      paths:
        - .ai/sessions/CURRENT.md
      refresh: on_session_end
      tags: [org-memory, session, handoff]
  operational_constraints:
    - repository_is_source_of_truth
    - no_runtime_mutation_of_p0_baseline
    - save_memory_required_on_session_handoff
    - evidence_trace_must_link_decision_release_review

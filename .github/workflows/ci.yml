name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage threshold
        run: npm run test:coverage
        env:
          CLOUDFLARE_ACCOUNT_ID: test-account
          D1_DATABASE_ID: test-database
          D1_API_TOKEN: test-token
          AUTH_SECRET: test-auth-secret-minimum-32-characters!!
          NODE_ENV: test

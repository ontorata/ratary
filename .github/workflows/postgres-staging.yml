name: Postgres Staging

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  postgres-staging:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_brain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_brain_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      SQL_PROVIDER: postgres
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_brain_test
      AUTH_SECRET: test-auth-secret-minimum-32-characters!!
      NODE_ENV: test
      POSTGRES_STAGING: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply Postgres schema
        run: npm run db:apply-postgres-schema

      - name: Postgres staging tests
        run: npm run test:postgres-staging
